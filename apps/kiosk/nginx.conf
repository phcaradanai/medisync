server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html (SPA entry) must never be cached, or redeploys aren't picked
    # up and the browser keeps loading stale hashed asset references.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location /medisync. {
        proxy_pass http://medisync-core:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Physical cabinet scanner SSE is proxied through Core so the browser
    # never needs the vending-agent bearer token or a cabinet network address.
    location /api/ {
        proxy_pass http://medisync-core:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
    }
}
