syntax = "proto3";

package medisync.kiosk.v1;

import "google/protobuf/timestamp.proto";
import "medisync/common/v1/pagination.proto";

option go_package = "github.com/adm-chura3inter/medisync/services/core/internal/gen/medisync/kiosk/v1;kioskv1";

// Kiosk is a physical dispensing device — a vending machine with shelves
// and slots, plus an auth terminal (code + PIN). This unified model
// replaces the former split between identity.kiosks (auth) and
// cabinet.cabinet (physical registry).
message Kiosk {
  string id = 1;
  string code = 2;
  string display_name = 3;
  bool active = 4;
  google.protobuf.Timestamp created_at = 5;
  // PIN is returned ONLY in the response to CreateKiosk and
  // ResetKioskPin. It is never stored in the database in plaintext
  // and is never readable via ListKiosks, UpdateKiosk, or any other
  // RPC. The admin must record or relay it at creation/reset time.
  optional string pin = 6;
  // Project this kiosk belongs to.
  string project_id = 7;
  // Full descriptive name (e.g. "ตู้ยาหอผู้ป่วย A"), merged from cabinet.
  string name = 8;
}

// ── Admin RPCs ─────────────────────────────────────────────────────

message ListKiosksRequest {
  medisync.common.v1.CursorPagination pagination = 1;
}

message ListKiosksResponse {
  repeated Kiosk kiosks = 1;
  string next_page_token = 2;
  int64 total_count = 3;
}

message CreateKioskRequest {
  string code = 1;
  string display_name = 2;
  string pin = 3;
  // Project to assign this kiosk to. Required.
  string project_id = 4;
  // Full descriptive name (e.g. "ตู้ยาหอผู้ป่วย A").
  string name = 5;
}

message CreateKioskResponse {
  Kiosk kiosk = 1;
}

message UpdateKioskRequest {
  string id = 1;
  optional string display_name = 2;
  optional bool active = 3;
  optional string name = 4;
}

message UpdateKioskResponse {
  Kiosk kiosk = 1;
}

message ResetKioskPinRequest {
  string id = 1;
  string new_pin = 2;
}

message ResetKioskPinResponse {
  Kiosk kiosk = 1;
}

// ── Kiosk RPCs ─────────────────────────────────────────────────────

message KioskLoginRequest {
  string code = 1;
  string pin = 2;
}

message KioskLoginResponse {
  string access_token = 1;
  google.protobuf.Timestamp expires_at = 2;
  Kiosk kiosk = 3;
}

message KioskValidateRequest {}

message KioskValidateResponse {
  Kiosk kiosk = 1;
}

service KioskService {
  // Admin endpoints — require admin auth (bearer token from IdentityService).
  rpc ListKiosks(ListKiosksRequest) returns (ListKiosksResponse);
  rpc CreateKiosk(CreateKioskRequest) returns (CreateKioskResponse);
  rpc UpdateKiosk(UpdateKioskRequest) returns (UpdateKioskResponse);
  rpc ResetKioskPin(ResetKioskPinRequest) returns (ResetKioskPinResponse);

  // Kiosk self-service endpoints.
  rpc KioskLogin(KioskLoginRequest) returns (KioskLoginResponse);
  rpc KioskValidate(KioskValidateRequest) returns (KioskValidateResponse);
}
