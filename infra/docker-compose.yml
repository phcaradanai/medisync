name: medisync

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medisync
      POSTGRES_PASSWORD: medisync
      POSTGRES_DB: medisync
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medisync -d medisync"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build:
      context: ../services/core
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://medisync:medisync@postgres:5432/medisync?sslmode=disable
      NATS_URL: nats://nats:4222
      JWT_SECRET: medisync-dev-secret-change-in-production
      JWT_EXPIRY_SECONDS: "3600"
      ADMIN_BOOTSTRAP_PASSWORD: medisync-local-admin-2026
      CARD_TOKEN_HMAC_KEY: medisync-dev-card-hmac-change-in-prod
      HTTP_ADDR: :8080
      LOG_LEVEL: info
      STARTUP_TIMEOUT_SECONDS: "60"
      PRINT_OPS_URL: http://print-ops:3000
      PRINT_OPS_API_KEY: ${PRINT_OPS_API_KEY:-printops-dev-apikey-2026}
      PRINT_OPS_FAKE: "false"
      VENDING_ENDPOINTS_JSON: '{"00010001":"http://vending-00010001:3303"}'
      VENDING_API_BEARER_TOKEN: ${VENDING_API_BEARER_TOKEN:-dev-bearer-token}
      # Local development has no serial cabinet attached. Override to false
      # when the routed vending agent is connected to real hardware.
      FULFILLMENT_FAKE: ${FULFILLMENT_FAKE:-true}
      VENDING_FAKE: ${VENDING_FAKE:-false}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      vending-00010001:
        condition: service_started

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - core

  kiosk:
    build:
      context: ..
      dockerfile: apps/kiosk/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - core

  demo-seed:
    image: medisync-kiosktester:local
    build:
      context: ../services/core
      dockerfile: cmd/kiosktester/Dockerfile
    entrypoint: ["/app/demoseed"]
    environment:
      DATABASE_URL: postgres://medisync:medisync@postgres:5432/medisync?sslmode=disable
    depends_on:
      core:
        condition: service_healthy
    restart: "no"

  kiosktester:
    image: medisync-kiosktester:local
    build:
      context: ../services/core
      dockerfile: cmd/kiosktester/Dockerfile
    command:
      - -mode=serve
      - -addr=:8899
      - -core=http://core:8080
      - -nats=nats://nats:4222
      # This URL is opened by the host browser, so it must not use
      # Docker's internal "kiosk" hostname.
      - -kiosk-url=http://localhost:5173
    ports:
      - "8899:8899"
    depends_on:
      core:
        condition: service_healthy
      nats:
        condition: service_healthy
      kiosk:
        condition: service_started
      demo-seed:
        condition: service_completed_successfully

  vending-00010001:
    build:
      context: ../../vending-3d-ctl-agent
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3303"
      API_BEARER_TOKEN: ${VENDING_API_BEARER_TOKEN:-dev-bearer-token}
      API_BEARER_REQUIRED: "true"
    ports:
      - "3303:3303"
    volumes:
      - vending-00010001-logs:/app/logs

volumes:
  postgres-data:
  nats-data:
  vending-00010001-logs:
