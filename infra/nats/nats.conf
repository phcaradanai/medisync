# MediSync production NATS configuration.
# Mounted read-only into the nats container.

jetstream {
    store_dir: /data
    max_memory_store: 0
    max_file_store: 10GB
}

# Bind monitoring HTTP to localhost — no public access.
# The docker-compose.prod.yml does not expose this port on the host.
http_port: 8222
http: "localhost:8222"

# Client port on all interfaces (internal docker network only).
port: 4222

# Server name for clustering (single-node for MVP).
server_name: medisync-nats-1
