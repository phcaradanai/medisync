name: medisync-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:?required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  core:
    build:
      context: ../services/core
      dockerfile: Dockerfile
    image: medisync-core:latest
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      NATS_URL: nats://nats:4222
    ports:
      - "${CORE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x core || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # Optional: add vending-3d-ctl-agent when hardware is connected.
  # vending:
  #   image: vending-3d-ctl:latest
  #   restart: unless-stopped
  #   depends_on:
  #     - core
  #   devices:
  #     - /dev/ttyUSB0:/dev/ttyUSB0
  #     - /dev/ttyUSB1:/dev/ttyUSB1

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    image: medisync-admin:latest
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5174}:80"
    depends_on:
      - core
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  kiosk:
    build:
      context: ..
      dockerfile: apps/kiosk/Dockerfile
    image: medisync-kiosk:latest
    restart: unless-stopped
    ports:
      - "${KIOSK_PORT:-5173}:80"
    depends_on:
      - core
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres-data:
  nats-data:
